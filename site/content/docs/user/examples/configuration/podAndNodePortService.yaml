# pod / host ports are mapped -- to -- container port
kind: Pod
apiVersion: v1
metadata:
  name: foo
  labels:
    app: foo
spec:
  containers:
    - name: foo
      # ONLY valid | AMD
      #image: hashicorp/http-echo:0.2.3
      image: hashicorp/http-echo:latest
      args:
        - "-text=foo"
      ports:
        - containerPort: 5678
        # NOT host directly. -- via -- service
        #hostPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: foo
spec:
  type: NodePort
  ports:
    - name: http
      nodePort: 30950
      port: 5678
  selector:
    app: foo